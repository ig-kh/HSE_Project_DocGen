services:
  api:
    build: .
    container_name: docsgen_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/docsgen_llm
      LOG_LEVEL: INFO
      AUTO_CREATE_TABLES: "true"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: docsgen_llm
    environment:
      POSTGRES_DB: docsgen_llm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docsgen_llm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
